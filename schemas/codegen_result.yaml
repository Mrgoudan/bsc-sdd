# The codegen agent's output: the generated BiSheng C files. verdict enum
# values become routable outcomes; codegen.write persists `files` to the worktree.
type: object
required: [verdict]
properties:
  verdict: { enum: [CODE, EMPTY] }
  files:
    type: array
    items:
      type: object
      required: [path, content]
      properties:
        path:    { type: string }   # repo-relative .cbs / .hbs path
        content: { type: string }   # full file contents
