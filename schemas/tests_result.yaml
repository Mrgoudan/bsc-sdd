# The TDD agent's output: one runnable test file derived from the SPEC ONLY
# (skeleton interface + contracts + assertions + success signals). Generated
# BEFORE any function body exists — implementation-blind by construction.
type: object
required: [verdict]
properties:
  verdict: { enum: [TESTS, EMPTY] }
  body: { type: string }            # complete .cbs: includes the module .hbs,
                                    # one main, prints each check, nonzero exit
                                    # on the first failure
  summary: { type: string }         # one line: what the suite covers
  cases:                            # traceability: which spec item each case pins
    type: array
    items:
      type: object
      properties:
        name:   { type: string }
        covers: { type: string }    # R-* key or contract_key the case exercises
