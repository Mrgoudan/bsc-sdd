# The decompose agent's output: the prose requirement split into atomic, ID'd
# items. verdict enum values become routable outcomes; reqs.load persists them.
type: object
required: [verdict]
properties:
  verdict: { enum: [REQS, EMPTY, QUESTIONS] }
  requirements:
    type: array
    items:
      type: object
      required: [req_key, text]
      properties:
        req_key: { type: string }   # stable id, e.g. R-1
        text:    { type: string }   # ONE atomic, testable requirement
        kind:    { enum: [behavior, success_signal, constraint, out_of_scope] }
  # Questions for the user. NON-BLOCKING ones are auto-answered with your
  # `recommended` and recorded as reviewable assumptions; BLOCKING ones park
  # the pipeline until the user answers (use only when the design truly forks).
  questions:
    type: array
    items:
      type: object
      required: [id, question]
      properties:
        id:             { type: string }   # stable, e.g. Q-1
        question:       { type: string }
        why_it_matters: { type: string }
        options:
          type: array
          items: { type: string }
        recommended:    { type: string }
        blocking:       { type: boolean }
