# The author agent's output contract: the spec IR. `verdict` enum values
# become the step's routable outcomes; `spec` is the IR that spec.load persists.
type: object
required: [verdict]
properties:
  verdict: { enum: [SPEC, EMPTY, QUESTIONS] }
  spec:
    type: object
    required: [feature_key, contracts]
    properties:
      feature_key: { type: string }
      requirement: { type: string }
      goal:        { type: string }
      contracts:
        type: array
        items:
          type: object
          required: [contract_key, signature]
          properties:
            contract_key: { type: string }
            # the requirement id(s) this contract helps fulfill (the trace).
            # every contract must cite >=1; the coverage gate enforces it.
            fulfills:
              type: array
              items: { type: string }
            # DIRECT calls this function makes to OTHER new functions (not
            # library/transitive), with the arg data-flow. The mechanical design
            # gate checks each handoff's qualifier compatibility before codegen.
            #   callee: a contract_key
            #   args:   { paramName: source }  where source is
            #           "param:<name>" (this fn's param) or "result:<contract_key>"
            #           (the _Owned/etc. return of a directly-called new function)
            calls:
              type: array
              items:
                type: object
                required: [callee]
                properties:
                  callee: { type: string }
                  args:   { type: object }
            module:       { type: string }
            # BiSheng C signature WITH ownership annotations — this is the part
            # the compiler proves (_Owned / _Nonnull / &_Mut / &_Const / ...).
            signature:    { type: string }
            summary:      { type: string }
            impl_file:    { type: string }
            assertions:
              type: array
              items:
                type: object
                required: [kind, text]
                properties:
                  kind: { enum: [pre, post, side_effect] }
                  # human-readable predicate — ALWAYS present (LLM reads this now)
                  text: { type: string }
                  # structured decidable form — the Z3 slot; fill when simple
                  formal: { type: string }
                  # true iff `formal` is in the decidable kernel (Z3-ready)
                  encodable: { type: boolean }
                  # who proves it: `compiler` for safety/ownership/init facts the
                  # BSC compiler already guarantees (the LLM checks skip these);
                  # `test`/`llm` for value/state facts. Default llm.
                  discharged_by: { enum: [compiler, test, llm] }
      chains:
        type: array
        items:
          type: object
          required: [chain_key, steps]
          properties:
            chain_key: { type: string }
            steps:
              type: array
              items: { type: string }   # each an api contract_key, in call order
  # Questions for the user. NON-BLOCKING ones are auto-answered with your
  # `recommended` and recorded as reviewable assumptions; BLOCKING ones park
  # the pipeline until the user answers (use only when the design truly forks).
  questions:
    type: array
    items:
      type: object
      required: [id, question]
      properties:
        id:             { type: string }   # stable, e.g. Q-1
        question:       { type: string }
        why_it_matters: { type: string }
        options:
          type: array
          items: { type: string }
        recommended:    { type: string }
        blocking:       { type: boolean }
