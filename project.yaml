# bsc-sdd — spec-driven development for BiSheng C.
#
# A STANDALONE pack (shares nothing with packs/bsc). The loop is:
#   requirement -> spec (IR) -> BiSheng C code -> verify -> PR
#
# Verification model (see README.md for the full reasoning):
#   * safety + composition  -> the BSC COMPILER (sound, free). The generated
#     I/O types carry ownership/nullability/borrow annotations; the compiler
#     checks them inside each function AND at every call site. That IS the
#     "do the pieces fit together" design check.
#   * behavior logic        -> tests (sound floor) + an LLM check over the
#     structured assertion slot (Z3-swappable later).
#
# Secrets are NOT here — sourced from $FORGEFLOW_SECRETS (0600) by the launcher.
name: bsc-sdd

paths:
  # the target project the generated BiSheng C lands in (its own clone, so the
  # codegen worktree + compile don't touch a dev tree). Everything else is
  # RELATIVE to this pack dir, resolved to absolute at load.
  repo:       ~/bsd/bsc-sdd-target
  # the existing bisheng compiler that verifies generated code — the SOUND gate.
  # a prebuilt clang (ENABLE_BSC); -fsyntax-only, no build needed. machine-specific.
  bsc_clang:  ~/bsd/llvm-project-dup/build/bin/clang
  libcbs_src: ~/bsd/llvm-project-dup/libcbs/src   # root of the BSC stdlib headers
  scripts:    scripts                            # pack scripts (test harness runner)
  examples:   examples                           # feature fixtures (smoke tests)
  data_root:  run                                # pack-local runtime cache (gitignored)

tools:
  git: { path: git, version_cmd: ["--version"] }

# resource guard: pause claiming under 4 GB free (BSC compiles are the hog).
min_free_disk_mb: 4096

# Parallel daemon. codegen fans out over functions/modules (lane: llm). The
# one serialized step is the compile of the shared target build (lane: build,
# cap 1) — same memory-guard rationale as the review pack.
concurrency:
  workers: 3
  lanes:
    build: 1            # BSC compile of the target: one at a time
    llm: 3              # concurrent codegen / author agent calls

# the board: daemon-served dashboard at http://127.0.0.1:8791 (loopback-only,
# no token needed; SSH-tunnel it from another machine).
http: { host: 127.0.0.1, port: 8791 }

# pack panels for the engine board (read-only SELECTs, generic widgets):
board:
  overview_panels:
    - title: open questions (answer via ./run-bsc-sdd.sh answer)
      kind: table
      sql: "SELECT feature_key, stage, q_key, question, recommended
            FROM dialogue WHERE answer IS NULL ORDER BY id"
    - title: verification trail (latest 12)
      kind: table
      sql: "SELECT checker, target, verdict, CASE sound WHEN 1 THEN 'sound'
            ELSE 'argued' END AS basis, at FROM verifications
            ORDER BY id DESC LIMIT 12"
  task_panels:
    - title: functions
      kind: status_grid
      sql: "SELECT contract_key AS label, status, attempts
            FROM codegen_units WHERE feature_key = :fk ORDER BY seq"
      params: { fk: feature_key }
    - title: dialogue (this feature)
      kind: table
      sql: "SELECT stage, q_key, question, COALESCE(answer,'(open)') AS answer,
            COALESCE(answered_by,'') AS decided_by FROM dialogue
            WHERE feature_key = :fk ORDER BY id"
      params: { fk: feature_key }

workflows: [workflows]

blocks:
  - blocks/spec.py          # spec.load (incremental reconcile), spec.validate (structural + coverage)
  - blocks/design.py        # design.check — mechanical join gate (qualifier handoffs), before codegen
  - blocks/codegen.py       # codegen.plan (fan-out units), codegen.write (emit .cbs into worktree)
  - blocks/verify.py        # verify.compile (BSC build = SOUND gate), verify.test (behavior floor)
  - blocks/providers.py     # spec_slice / contracts / assertions context providers (payload optimization)

# The pack's own IR + verification tables (engine core ships only generic ones).
schema:
  - schema/schema.sql

# Retrieval corpora served through the ENGINE's select: cascade (channels ->
# RRF -> rerank -> MMR -> budget packing -> utility feedback; vectors cached
# per row in corpus_embeddings). embed_with: hashing = deterministic lexical
# vectors, zero setup. PRODUCTION UPGRADE (config, not code): declare a pinned
# local embedder under models: and point embed_with at it, e.g.
#   models:
#     retrieval: { path: /opt/models/embed-small.bin,
#                  sha256: "<pin>" }          # deterministic: fixed weights
#   corpora:
#     green_bodies: { ..., embed_with: retrieval }
corpora:
  green_bodies:            # self-improving: every compiled-green function
    table: green_bodies    # (a view: summary + signature + body)
    key: key
    text: text
    embed_with: hashing

prompts:
  decompose: prompts/decompose.md  # requirement prose -> atomic ID'd requirements
  reqcheck: prompts/reqcheck.md   # fidelity gate: raw requirement <-> R-* items
  author:  prompts/author.md      # requirements -> spec IR (with fulfills trace)
  skeleton: prompts/skeleton.md   # module interface (.hbs + .cbs head), once
  genfn:   prompts/genfn.md       # ONE function body against the skeleton
  behavior: prompts/behavior.md   # LLM behavior-logic check over structured assertions
  conform: prompts/conformance.md # impl -> req conformance (the outer envelope)

schemas:
  requirements_result: schemas/requirements_result.yaml
  reqs_verdict:     schemas/reqs_verdict.yaml
  spec_result:      schemas/spec_result.yaml
  skeleton_result:  schemas/skeleton_result.yaml
  function_result:  schemas/function_result.yaml
  behavior_verdict: schemas/behavior_verdict.yaml
  conformance_result: schemas/conformance_result.yaml

agents:
  # GLM behind the agentic claude CLI (so the bsc-* skills + worktree work).
  decompose: { backend: claude-cli, model: GLM-5.2,
               env_keys: [ANTHROPIC_BASE_URL, ANTHROPIC_AUTH_TOKEN] }
  reqcheck: { backend: claude-cli, model: GLM-5.2,
              env_keys: [ANTHROPIC_BASE_URL, ANTHROPIC_AUTH_TOKEN] }
  author:   { backend: claude-cli, model: GLM-5.2,
              env_keys: [ANTHROPIC_BASE_URL, ANTHROPIC_AUTH_TOKEN] }
  skeleton: { backend: claude-cli, model: GLM-5.2,
              env_keys: [ANTHROPIC_BASE_URL, ANTHROPIC_AUTH_TOKEN] }
  genfn:    { backend: claude-cli, model: GLM-5.2,
              env_keys: [ANTHROPIC_BASE_URL, ANTHROPIC_AUTH_TOKEN] }
  behavior: { backend: claude-cli, model: GLM-5.2,
              env_keys: [ANTHROPIC_BASE_URL, ANTHROPIC_AUTH_TOKEN] }
  conform:  { backend: claude-cli, model: GLM-5.2,
              env_keys: [ANTHROPIC_BASE_URL, ANTHROPIC_AUTH_TOKEN] }

params:
  # compile a generated .cbs for syntax + ownership/nullability/init checking.
  # {file} is templated per unit by verify.compile. This is the SOUND gate.
  # every libcbs module dir is an include root (string.hbs, vec.hbs, ... are
  # included bare by generated headers, mirroring how libcbs code includes them)
  compile_cmd: ["{paths.bsc_clang}", "-fsyntax-only", "-Wno-nullability-completeness",
                "-I", "{paths.libcbs_src}/bishengc_safety", "-I", "{paths.libcbs_src}/string",
                "-I", "{paths.libcbs_src}/vec", "-I", "{paths.libcbs_src}/option",
                "-I", "{paths.libcbs_src}/result", "-I", "{paths.libcbs_src}/slice",
                "-I", "{paths.libcbs_src}/cell", "-I", "{paths.libcbs_src}/rc",
                "-I", "{paths.libcbs_src}/hash", "-I", "{paths.libcbs_src}/map",
                "-I", "{paths.libcbs_src}/list", "-I", "{paths.libcbs_src}/raw_vec",
                "-I", "{paths.libcbs_src}/raw_table", "{file}"]
  # behavior floor: compile the GENERATED module + the feature's smoke test
  # into a real binary and run it ({worktree} = this task's worktree, resolved
  # by verify.test). Fully configuration: swap the script/smoke per feature.
  test_cmd: ["{paths.scripts}/run_tests.sh", "{worktree}",
             "{paths.examples}/cjson/smoke.cbs",
             "{paths.bsc_clang}", "{paths.libcbs_src}"]
  # budget guard on every agent.run step (runaway guard + context.json manifest).
  max_context_bytes: 300000
