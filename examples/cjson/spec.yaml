# Rendered from the forgeflow DB (source of truth). Do not hand-edit;
# regenerate with scripts/render_spec.py after the spec changes.
feature_key: CJSON-P1
status: draft
goal: "A safe-by-construction in-memory JSON value model for Phase 1: build, inspect, and free trees of JSON values where the BSC ownership system turns leaks, double-free, and use-after-free into compile errors at the API boundary, and recursive cleanup frees every node exactly once."
requirements:
  - req_key: R-1
    kind: constraint
    text: "A JSON value has exactly one kind: null, boolean, number, string, array, or object."
  - req_key: R-2
    kind: constraint
    text: A boolean holds either true or false.
  - req_key: R-3
    kind: constraint
    text: A number holds one numeric (floating-point) value.
  - req_key: R-4
    kind: constraint
    text: A string holds a piece of text.
  - req_key: R-5
    kind: constraint
    text: An array is an ordered sequence of values.
  - req_key: R-6
    kind: constraint
    text: "An object is an ordered sequence of members, each a name (text key) paired with a value."
  - req_key: R-7
    kind: constraint
    text: "Array and object children may themselves be arrays or objects, to any depth."
  - req_key: R-8
    kind: behavior
    text: "Report a value's kind: null, boolean, number, string, array, or object."
  - req_key: R-9
    kind: behavior
    text: "For a boolean, report whether it is true or false."
  - req_key: R-10
    kind: behavior
    text: Read a number's numeric value.
  - req_key: R-11
    kind: behavior
    text: Read a string's text.
  - req_key: R-12
    kind: behavior
    text: Create a null value.
  - req_key: R-13
    kind: behavior
    text: Create a true boolean value.
  - req_key: R-14
    kind: behavior
    text: Create a false boolean value.
  - req_key: R-15
    kind: behavior
    text: Create a boolean from a true/false flag.
  - req_key: R-16
    kind: behavior
    text: Create a number from a numeric value.
  - req_key: R-17
    kind: behavior
    text: Reading a created number back gives the value it was created with.
  - req_key: R-18
    kind: behavior
    text: Create a string from text.
  - req_key: R-19
    kind: behavior
    text: "A created string keeps its own copy of the text, so it stays valid even if the caller's original buffer goes away."
  - req_key: R-20
    kind: behavior
    text: Create an empty array.
  - req_key: R-21
    kind: behavior
    text: Create an empty object.
  - req_key: R-22
    kind: behavior
    text: Append a value to the end of an array.
  - req_key: R-23
    kind: behavior
    text: "When a value is appended to an array, the array takes the value in: from then on the value is part of the array."
  - req_key: R-24
    kind: behavior
    text: A value appended to an array is freed with the array.
  - req_key: R-25
    kind: behavior
    text: Report an array's size (how many items it holds).
  - req_key: R-26
    kind: behavior
    text: Get the item at a 0-based position in an array.
  - req_key: R-27
    kind: behavior
    text: An array position that is negative yields nothing.
  - req_key: R-28
    kind: behavior
    text: An array position past the end yields nothing.
  - req_key: R-29
    kind: behavior
    text: Add a value to an object under a string key.
  - req_key: R-30
    kind: behavior
    text: "When a value is added to an object, the object takes the value in."
  - req_key: R-31
    kind: behavior
    text: The object keeps its own copy of the key.
  - req_key: R-32
    kind: behavior
    text: "Look up a member by key using the default lookup, which matches keys ignoring letter case."
  - req_key: R-33
    kind: behavior
    text: "Look up a member by key using a case-sensitive lookup, which matches keys exactly."
  - req_key: R-34
    kind: behavior
    text: "A lookup yields the member's value, or nothing if no such key is present."
  - req_key: R-35
    kind: behavior
    text: Report whether a given key is present in an object.
  - req_key: R-36
    kind: behavior
    text: Add a named null to an object in one step.
  - req_key: R-37
    kind: behavior
    text: Add a named true to an object in one step.
  - req_key: R-38
    kind: behavior
    text: Add a named false to an object in one step.
  - req_key: R-39
    kind: behavior
    text: Add a named boolean (from a true/false flag) to an object in one step.
  - req_key: R-40
    kind: behavior
    text: Add a named number to an object in one step.
  - req_key: R-41
    kind: behavior
    text: Add a named string to an object in one step.
  - req_key: R-42
    kind: behavior
    text: Add a fresh empty array to an object under a name in one step.
  - req_key: R-43
    kind: behavior
    text: Add a fresh empty object to an object under a name in one step.
  - req_key: R-44
    kind: behavior
    text: "When a fresh array or object is added in one step, the newly created child is handed back so the caller can keep building inside it."
  - req_key: R-45
    kind: behavior
    text: Adding a named value in one step is equivalent to creating that value and then adding it under that name.
  - req_key: R-46
    kind: behavior
    text: Delete a value.
  - req_key: R-47
    kind: behavior
    text: "Deleting a value frees the value and everything nested inside it — all array items and all object members, recursively."
  - req_key: R-48
    kind: behavior
    text: "When a value is deleted, each nested node is freed exactly once."
  - req_key: R-49
    kind: success_signal
    text: "Building a nested object/array and then deleting the root cleans up completely: every node is freed exactly once."
  - req_key: R-50
    kind: success_signal
    text: "After deleting the root, nothing leaks."
  - req_key: R-51
    kind: success_signal
    text: "After deleting the root, nothing is freed twice."
  - req_key: R-52
    kind: success_signal
    text: "After deleting the root, nothing is touched after being freed."
  - req_key: R-53
    kind: success_signal
    text: "After appending to an array, its size is exactly one greater."
  - req_key: R-54
    kind: success_signal
    text: "After appending to an array, the new item is the one found at the last position."
  - req_key: R-55
    kind: success_signal
    text: "After adding a key to an object, looking that key up returns the value that was added."
  - req_key: R-56
    kind: success_signal
    text: "Looking up a key that was never added reports \"not present\"."
  - req_key: R-57
    kind: success_signal
    text: "The default object lookup treats \"Name\" and \"name\" as the same key."
  - req_key: R-58
    kind: success_signal
    text: "The case-sensitive object lookup treats \"Name\" and \"name\" as different keys."
  - req_key: R-59
    kind: success_signal
    text: A number reads back as the value it was created with.
  - req_key: R-60
    kind: success_signal
    text: A string keeps its own copy of the text.
  - req_key: R-61
    kind: success_signal
    text: "A negative or out-of-range array position yields \"nothing\"."
  - req_key: R-62
    kind: success_signal
    text: Adding a named value in one step leaves the object in the same state as creating that value and adding it under that name separately.
  - req_key: R-63
    kind: out_of_scope
    text: Parsing text into values is out of scope for Phase 1.
  - req_key: R-64
    kind: out_of_scope
    text: Printing values to text is out of scope for Phase 1.
  - req_key: R-65
    kind: out_of_scope
    text: Minifying is out of scope for Phase 1.
  - req_key: R-66
    kind: out_of_scope
    text: "Structural editing beyond append — detaching, deleting a single item, replacing, inserting at a position — is out of scope."
  - req_key: R-67
    kind: out_of_scope
    text: Duplicating a value is out of scope.
  - req_key: R-68
    kind: out_of_scope
    text: Comparing two values for equality is out of scope.
  - req_key: R-69
    kind: out_of_scope
    text: Shared or aliased children (the same value referenced in two places) is out of scope.
  - req_key: R-70
    kind: out_of_scope
    text: Raw (verbatim) JSON values are out of scope.
  - req_key: R-71
    kind: out_of_scope
    text: Bulk constructors from arrays of numbers/strings are out of scope.
  - req_key: R-72
    kind: out_of_scope
    text: Custom memory allocators are out of scope.
contracts:
  - contract_key: API-IS-NULL
    fulfills: [R-1, R-8]
    module: cjson
    signature: "_Safe _Bool cJSON_IsNull(const JSON_Value *_Borrow _Nonnull v);"
    impl_file: src/cjson.cbs
    summary: Report whether a value is the null kind.
    assertions:
      - kind: post
        text: Returns true iff the value's kind is null; false otherwise.
        formal: result == (kind(v) == Null)
        encodable: true
  - contract_key: API-IS-BOOLEAN
    fulfills: [R-1, R-2, R-8]
    module: cjson
    signature: "_Safe _Bool cJSON_IsBoolean(const JSON_Value *_Borrow _Nonnull v);"
    impl_file: src/cjson.cbs
    summary: Report whether a value is the boolean kind.
    assertions:
      - kind: post
        text: Returns true iff the value's kind is boolean; false otherwise.
        formal: result == (kind(v) == Boolean)
        encodable: true
  - contract_key: API-IS-NUMBER
    fulfills: [R-1, R-3, R-8]
    module: cjson
    signature: "_Safe _Bool cJSON_IsNumber(const JSON_Value *_Borrow _Nonnull v);"
    impl_file: src/cjson.cbs
    summary: Report whether a value is the number kind.
    assertions:
      - kind: post
        text: Returns true iff the value's kind is number; false otherwise.
        formal: result == (kind(v) == Number)
        encodable: true
  - contract_key: API-IS-STRING
    fulfills: [R-1, R-4, R-8]
    module: cjson
    signature: "_Safe _Bool cJSON_IsString(const JSON_Value *_Borrow _Nonnull v);"
    impl_file: src/cjson.cbs
    summary: Report whether a value is the string kind.
    assertions:
      - kind: post
        text: Returns true iff the value's kind is string; false otherwise.
        formal: result == (kind(v) == String)
        encodable: true
  - contract_key: API-IS-ARRAY
    fulfills: [R-1, R-5, R-8]
    module: cjson
    signature: "_Safe _Bool cJSON_IsArray(const JSON_Value *_Borrow _Nonnull v);"
    impl_file: src/cjson.cbs
    summary: Report whether a value is the array kind.
    assertions:
      - kind: post
        text: Returns true iff the value's kind is array; false otherwise.
        formal: result == (kind(v) == Array)
        encodable: true
  - contract_key: API-IS-OBJECT
    fulfills: [R-1, R-6, R-8]
    module: cjson
    signature: "_Safe _Bool cJSON_IsObject(const JSON_Value *_Borrow _Nonnull v);"
    impl_file: src/cjson.cbs
    summary: Report whether a value is the object kind.
    assertions:
      - kind: post
        text: Returns true iff the value's kind is object; false otherwise.
        formal: result == (kind(v) == Object)
        encodable: true
  - contract_key: API-IS-TRUE
    fulfills: [R-13, R-2, R-9]
    module: cjson
    signature: "_Safe _Bool cJSON_IsTrue(const JSON_Value *_Borrow _Nonnull v);"
    impl_file: src/cjson.cbs
    summary: Report whether a value is a boolean currently set to true.
    assertions:
      - kind: post
        text: "Returns true iff the value is a boolean whose boolean value is true; false otherwise (including a false boolean, or a non-boolean)."
        formal: "result == (kind(v) == Boolean && boolval(v) == true)"
        encodable: true
  - contract_key: API-IS-FALSE
    fulfills: [R-14, R-2, R-9]
    module: cjson
    signature: "_Safe _Bool cJSON_IsFalse(const JSON_Value *_Borrow _Nonnull v);"
    impl_file: src/cjson.cbs
    summary: Report whether a value is a boolean currently set to false.
    assertions:
      - kind: post
        text: "Returns true iff the value is a boolean whose boolean value is false; false otherwise (including a true boolean, or a non-boolean)."
        formal: "result == (kind(v) == Boolean && boolval(v) == false)"
        encodable: true
  - contract_key: API-GET-NUMBER
    fulfills: [R-10, R-17, R-3, R-59]
    module: cjson
    signature: "_Safe double cJSON_GetNumber(const JSON_Value *_Borrow _Nonnull v);"
    impl_file: src/cjson.cbs
    summary: Read the numeric value held by a number value.
    assertions:
      - kind: pre
        text: The value is of the number kind.
        formal: kind(v) == Number
        encodable: true
      - kind: post
        text: Returns the numeric value the number value currently holds.
        formal: result == numval(v)
        encodable: true
  - contract_key: API-GET-STRING
    fulfills: [R-11, R-19, R-4, R-60]
    module: cjson
    signature: "_Safe const char *_Borrow _Nonnull cJSON_GetString(const JSON_Value *_Borrow _Nonnull v);"
    impl_file: src/cjson.cbs
    summary: "Read the text held by a string value, as a borrow into the value's own stored copy."
    assertions:
      - kind: pre
        text: The value is of the string kind.
        formal: kind(v) == String
        encodable: true
      - kind: post
        text: Returns a borrow into the value's own stored text copy; reading through it yields the text the value was created with.
        formal: result == strbuf(v)
        encodable: true
  - contract_key: API-CREATE-NULL
    fulfills: [R-12]
    module: cjson
    signature: "_Safe JSON_Value *_Owned _Nonnull cJSON_CreateNull(void);"
    impl_file: src/cjson.cbs
    summary: Create a null value.
    assertions:
      - kind: post
        text: The new value's kind is null.
        formal: kind(result) == Null
        encodable: true
  - contract_key: API-CREATE-TRUE
    fulfills: [R-13]
    module: cjson
    signature: "_Safe JSON_Value *_Owned _Nonnull cJSON_CreateTrue(void);"
    impl_file: src/cjson.cbs
    summary: Create a boolean value set to true.
    assertions:
      - kind: post
        text: The new value's kind is boolean and its boolean value is true.
        formal: "kind(result) == Boolean && boolval(result) == true"
        encodable: true
  - contract_key: API-CREATE-FALSE
    fulfills: [R-14]
    module: cjson
    signature: "_Safe JSON_Value *_Owned _Nonnull cJSON_CreateFalse(void);"
    impl_file: src/cjson.cbs
    summary: Create a boolean value set to false.
    assertions:
      - kind: post
        text: The new value's kind is boolean and its boolean value is false.
        formal: "kind(result) == Boolean && boolval(result) == false"
        encodable: true
  - contract_key: API-CREATE-BOOL
    fulfills: [R-15]
    module: cjson
    signature: "_Safe JSON_Value *_Owned _Nonnull cJSON_CreateBool(_Bool b);"
    impl_file: src/cjson.cbs
    summary: Create a boolean value from a true/false flag.
    assertions:
      - kind: post
        text: The new value's kind is boolean and its boolean value equals the given flag.
        formal: "kind(result) == Boolean && boolval(result) == b"
        encodable: true
  - contract_key: API-CREATE-NUMBER
    fulfills: [R-16, R-17, R-3, R-59]
    module: cjson
    signature: "_Safe JSON_Value *_Owned _Nonnull cJSON_CreateNumber(double num);"
    impl_file: src/cjson.cbs
    summary: Create a number value from a numeric value; reading it back gives that value.
    assertions:
      - kind: post
        text: The new value's kind is number and its stored numeric value equals the given number.
        formal: "kind(result) == Number && numval(result) == num"
        encodable: true
  - contract_key: API-CREATE-STRING
    fulfills: [R-18, R-19, R-4, R-60]
    module: cjson
    signature: "_Safe JSON_Value *_Owned _Nonnull cJSON_CreateString(const char *_Borrow _Nonnull s);"
    impl_file: src/cjson.cbs
    summary: "Create a string value from text, keeping its own copy of the text."
    assertions:
      - kind: post
        text: The new value's kind is string and its stored text equals the given text.
        formal: "kind(result) == String && strtext(result) == strtext(s)"
        encodable: true
      - kind: side_effect
        text: "The value stores its own copy of the text, independent of the caller's buffer, so it stays valid even if the caller's original buffer is freed."
  - contract_key: API-CREATE-ARRAY
    fulfills: [R-20, R-5]
    module: cjson
    signature: "_Safe JSON_Value *_Owned _Nonnull cJSON_CreateArray(void);"
    impl_file: src/cjson.cbs
    summary: Create an empty array value.
    assertions:
      - kind: post
        text: The new value's kind is array and it holds zero items.
        formal: "kind(result) == Array && array_size(result) == 0"
        encodable: true
  - contract_key: API-CREATE-OBJECT
    fulfills: [R-21, R-6]
    module: cjson
    signature: "_Safe JSON_Value *_Owned _Nonnull cJSON_CreateObject(void);"
    impl_file: src/cjson.cbs
    summary: Create an empty object value.
    assertions:
      - kind: post
        text: The new value's kind is object and it holds zero members.
        formal: "kind(result) == Object && object_count(result) == 0"
        encodable: true
  - contract_key: API-ARRAY-APPEND
    fulfills: [R-22, R-23, R-24, R-5, R-53, R-54, R-7]
    module: cjson
    signature: "_Safe void cJSON_ArrayAppend(JSON_Value *_Borrow _Nonnull array, JSON_Value *_Owned _Nonnull item);"
    impl_file: src/cjson.cbs
    summary: Append a value to the end of an array; the array takes the value in.
    assertions:
      - kind: pre
        text: The array value is of the array kind.
        formal: kind(array) == Array
        encodable: true
      - kind: side_effect
        text: "The appended value becomes the last child of the array; members are appended, not replaced. The item may itself be an array or object, so children may nest to any depth."
      - kind: post
        text: The array's size is exactly one greater than before the call.
        formal: array_size(array) == old(array_size(array)) + 1
        encodable: true
      - kind: post
        text: The appended value is the one found at the new last position.
        formal: "array_get(array, array_size(array) - 1) == item"
        encodable: true
  - contract_key: API-ARRAY-SIZE
    fulfills: [R-25, R-5, R-53]
    module: cjson
    signature: "_Safe size_t cJSON_ArraySize(const JSON_Value *_Borrow _Nonnull array);"
    impl_file: src/cjson.cbs
    summary: Report how many items an array holds.
    assertions:
      - kind: pre
        text: The array value is of the array kind.
        formal: kind(array) == Array
        encodable: true
      - kind: post
        text: Returns the number of items the array holds.
        formal: result == array_size(array)
        encodable: true
  - contract_key: API-ARRAY-GET
    fulfills: [R-26, R-27, R-28, R-5, R-54, R-61]
    module: cjson
    signature: "_Safe const JSON_Value *_Borrow _Nullable cJSON_ArrayGet(const JSON_Value *_Borrow _Nonnull array, int index);"
    impl_file: src/cjson.cbs
    summary: Get the item at a 0-based position; a negative or past-the-end position yields nothing.
    assertions:
      - kind: pre
        text: The array value is of the array kind.
        formal: kind(array) == Array
        encodable: true
      - kind: post
        text: Returns nothing iff the position is negative or past the end.
        formal: "(result == null) <=> (index < 0 || index >= array_size(array))"
        encodable: true
      - kind: post
        text: "When the position is in range, returns the child at that position."
        formal: "(0 <= index && index < array_size(array)) => result == array_get(array, index)"
        encodable: true
  - contract_key: API-OBJECT-ADD
    fulfills: [R-29, R-30, R-31, R-45, R-55, R-6, R-7]
    module: cjson
    signature: "_Safe void cJSON_ObjectAdd(JSON_Value *_Borrow _Nonnull obj, const char *_Borrow _Nonnull key, JSON_Value *_Owned _Nonnull value);"
    impl_file: src/cjson.cbs
    summary: Add a value under a string key; the object keeps its own copy of the key and takes the value in.
    assertions:
      - kind: pre
        text: The object value is of the object kind.
        formal: kind(obj) == Object
        encodable: true
      - kind: side_effect
        text: "The object stores its own copy of the key (independent of the caller's buffer) and appends a new member pairing that key-copy with the value; it does not replace an existing member with the same key. The value may itself be an array or object, so children may nest to any depth."
      - kind: post
        text: The object's member count is exactly one greater than before the call.
        formal: object_count(obj) == old(object_count(obj)) + 1
        encodable: true
      - kind: post
        text: The exact (case-sensitive) key is present after the add.
        formal: "object_has(obj, key) == true"
        encodable: true
      - kind: post
        text: A case-sensitive lookup of the key returns the value that was added.
        formal: "object_get_cs(obj, key) == value"
        encodable: true
  - contract_key: API-OBJECT-GET
    fulfills: [R-32, R-34, R-55, R-56, R-57, R-6]
    module: cjson
    signature: "_Safe const JSON_Value *_Borrow _Nullable cJSON_ObjectGet(const JSON_Value *_Borrow _Nonnull obj, const char *_Borrow _Nonnull key);"
    impl_file: src/cjson.cbs
    summary: "Default lookup of a member by key, matching keys ignoring letter case."
    assertions:
      - kind: pre
        text: The object value is of the object kind.
        formal: kind(obj) == Object
        encodable: true
      - kind: post
        text: Returns nothing iff no member's key matches the given key ignoring letter case.
        formal: "(result == null) <=> !(exists m in members(obj) : ci_eq(member_key(m), key))"
        encodable: true
      - kind: post
        text: "When a match exists, returns the value of a member whose key matches the given key ignoring letter case."
        formal: "result != null => (exists m in members(obj) : ci_eq(member_key(m), key) && member_value(m) == result)"
        encodable: true
      - kind: post
        text: "If multiple members match case-insensitively, returns the first such member in insertion order."
  - contract_key: API-OBJECT-GET-CASESENSITIVE
    fulfills: [R-33, R-34, R-55, R-56, R-58, R-6]
    module: cjson
    signature: "_Safe const JSON_Value *_Borrow _Nullable cJSON_ObjectGetCaseSensitive(const JSON_Value *_Borrow _Nonnull obj, const char *_Borrow _Nonnull key);"
    impl_file: src/cjson.cbs
    summary: "Case-sensitive lookup of a member by key, matching keys exactly."
    assertions:
      - kind: pre
        text: The object value is of the object kind.
        formal: kind(obj) == Object
        encodable: true
      - kind: post
        text: Returns nothing iff no member's key exactly equals the given key.
        formal: "(result == null) <=> !(exists m in members(obj) : member_key(m) == key)"
        encodable: true
      - kind: post
        text: "When a match exists, returns the value of a member whose key exactly equals the given key."
        formal: "result != null => (exists m in members(obj) : member_key(m) == key && member_value(m) == result)"
        encodable: true
      - kind: post
        text: "If multiple members share the exact key, returns the first such member in insertion order."
  - contract_key: API-OBJECT-HAS
    fulfills: [R-35, R-56, R-6]
    module: cjson
    signature: "_Safe _Bool cJSON_ObjectHas(const JSON_Value *_Borrow _Nonnull obj, const char *_Borrow _Nonnull key);"
    impl_file: src/cjson.cbs
    summary: "Report whether a given key is present, matching keys ignoring letter case (the default lookup's notion of presence)."
    assertions:
      - kind: pre
        text: The object value is of the object kind.
        formal: kind(obj) == Object
        encodable: true
      - kind: post
        text: Returns true iff a member with a key matching the given key ignoring letter case is present.
        formal: "result == (exists m in members(obj) : ci_eq(member_key(m), key))"
        encodable: true
  - contract_key: API-ADD-NULL-TO-OBJECT
    fulfills: [R-36, R-45, R-62]
    module: cjson
    signature: "_Safe void cJSON_AddNullToObject(JSON_Value *_Borrow _Nonnull obj, const char *_Borrow _Nonnull key);"
    impl_file: src/cjson.cbs
    summary: "Add a null under a name in one step, equivalent to creating a null and adding it under that name."
    assertions:
      - kind: pre
        text: The object value is of the object kind.
        formal: kind(obj) == Object
        encodable: true
      - kind: side_effect
        text: "Equivalent to cJSON_ObjectAdd(obj, key, cJSON_CreateNull()): the object stores its own copy of the key and adds a null value under it, leaving the object in the same state as the two-step create-then-add."
      - kind: post
        text: The exact key is present and the member's value is of the null kind.
        formal: "object_has(obj, key) == true && kind(object_get_cs(obj, key)) == Null"
        encodable: true
