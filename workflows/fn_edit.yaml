# fn_edit — surgical change to ONE generated function.
#
# The dividing line is the FROZEN INTERFACE (exactly what the contract hash
# pins): a body-only edit re-enters the per-function loop — regenerate against
# the frozen skeleton, BSC compile (sound), smoke test — with NO spec
# ceremony. An edit that cannot fit the interface becomes a HUMAN DECISION;
# only a picked verdict escalates into the full requirement -> spec -> build
# pipeline (spec.requested with edit_request), where fidelity/reconcile
# ripple only what actually changed.
workflow: fn_edit
consumes: [fn.edit.routed]
emits: [fn.edited, fn.edit.blocked, spec.requested]

steps:
  - name: arm_target                     # arm the unit: it becomes the ACTIVE
    block: codegen.edit_target       # cursor of the standard per-function
    timeout_s: 30                    # loop; attempts reset (fresh budget).
    outcomes: { ok: workspace, missing: blocked }

  - name: workspace
    block: worktree.create
    timeout_s: 120
    params: { repo: "{paths.repo}", base: "{payload.base}" }
    outcomes: { ok: rehydrate, dirty: failed, timeout: failed }

  - name: rehydrate                  # restore skeleton + every done body, so
    block: codegen.rehydrate         # the edited function compiles against
    timeout_s: 60                    # the real module, not a stub.
    outcomes: { ok: edit_function, empty: blocked }

  - name: edit_function                       # the one agent call: new body (frozen
    block: agent.run                 # signature) or INTERFACE + the decision
    llm: fnedit                      # for the human gate.
    schema: fnedit_result
    max_visits: 8
    params: { max_context_bytes: "{pack.max_context_bytes}" }
    timeout_s: 1800
    context:
      - payload                      # the user's instruction
      - skeleton                     # the frozen module interface
      - active_contract              # this function: signature + assertions
      - current_body                 # what the user is asking to change
      - compile_feedback             # on a retry: the compiler's errors
      - fix_hints: { k: 2 }          # past (same error -> fixed body) lessons
      - edit_rounds                  # gate thread: revise comments to fold in
    outcomes:
      FUNCTION: write_function
      INTERFACE: interface_gate
      EMPTY: blocked
      agent_limit: parked
      agent_backend: parked
      agent_invalid: parked
      timeout: parked

  - name: write_function                   # REPLACES the body, rebuilds the module
    block: codegen.write_fn
    max_visits: 8
    timeout_s: 30
    outcomes: { ok: compile, empty: blocked }

  - name: compile                    # the SOUND gate, same as any codegen
    block: verify.compile
    lane: build
    max_visits: 8
    timeout_s: 600
    params:
      cmd: "{pack.compile_cmd}"
      repo: "{paths.repo}"
    outcomes:
      green: mark_done
      red: retry_gate
      error: blocked
      timeout: parked

  - name: mark_done                  # green -> unit done (+ fix_lesson if it
    block: codegen.mark_done         # fought the compiler)
    timeout_s: 30
    outcomes: { ok: smoke_test }

  - name: smoke_test                       # behavior floor: the feature's smoke test
    block: verify.test               # still passes with the edited body.
    timeout_s: 1800
    params: { cmd: "{pack.test_cmd}", repo: "{paths.repo}" }
    outcomes: { pass: write_docs, fail: blocked, error: blocked, timeout: parked }

  - name: write_docs                 # refresh the docs' verification trail
    block: docs.render               # after a surgical edit.
    timeout_s: 30
    params: { out_dir: "{paths.data_root}/docs" }
    outcomes: { ok: announce, empty: blocked }

  - name: announce
    block: event.emit
    timeout_s: 10
    params:
      name: fn.edited
      data: { feature_key: "{payload.feature_key}",
              contract_key: "{payload.contract_key}" }
    outcomes: { ok: done }

  - name: retry_gate
    block: codegen.retry_gate
    max_visits: 8
    params: { cap: 3 }
    timeout_s: 10
    outcomes: { retry: edit_function, giveup: blocked }

  - name: interface_gate                       # THE HUMAN GATE for interface-touching
    block: human.ask                 # edits: picked -> full pipeline; a revise
    max_visits: 6                    # comment sends the agent back with the
    timeout_s: 30                    # instruction refined; abandon stops.
    params: { key: "{payload.feature_key}/fn-edit/{payload.contract_key}" }
    outcomes:
      picked: escalate
      revise: edit_function
      reframe: edit_function
      abandon: blocked
      awaiting_human: parked

  - name: escalate                   # human said go: the WHOLE process —
    block: codegen.escalate          # spec.requested with the stored
    timeout_s: 30                    # requirement + edit_request rides in.
    outcomes: { ok: done, missing: blocked }

  - name: blocked
    block: event.emit
    timeout_s: 10
    params:
      name: fn.edit.blocked
      data: { feature_key: "{payload.feature_key}",
              contract_key: "{payload.contract_key}" }
    outcomes: { ok: done }
