# sdd_build — validated spec -> BiSheng C -> verify.
#
# The verification model, step by step:
#   compile  = the SOUND gate. A green BSC compile proves the safety column
#              (null/own/init/borrow) INSIDE every function AND across every
#              call site — i.e. the whole safety design + the joins, for free.
#   test     = the business floor (runs the code, sound per case).
#   business = the LLM residual: the value/state predicates the compiler can't
#              see, checked over the STRUCTURED assertion slot (Z3-swappable).
workflow: sdd_build
consumes: [spec.validated]
emits: [sdd.completed, sdd.blocked]

steps:
  - name: plan                       # units = modules (functions in a module
    block: codegen.plan              # share the struct/helpers -> generated
    timeout_s: 30                    # together). Single module = one loop below.
    outcomes: { ok: workspace, empty: done }

  - name: workspace
    block: worktree.create
    timeout_s: 120
    params: { repo: "{paths.repo}", base: "{payload.base}" }
    outcomes: { ok: need_skeleton, dirty: failed, timeout: failed }

  - name: need_skeleton              # first run / signature change -> build the
    block: codegen.need_skeleton     # skeleton; a plain modification -> reuse the
    timeout_s: 10                    # cached one (restore the worktree from DB).
    outcomes: { build: skeleton, reuse: rehydrate }

  - name: skeleton                   # the module interface, ONCE: .hbs (struct +
    block: agent.run                 # EVERY declaration) + .cbs preamble. Frozen,
    llm: skeleton                    # so per-function codegen stays consistent.
    schema: skeleton_result
    params: { max_context_bytes: "{pack.max_context_bytes}" }
    timeout_s: 1800
    context:
      - payload
      - spec_slice                   # all the module's contracts (signatures)
    outcomes:
      SKELETON: skel_write
      EMPTY: blocked
      agent_limit: parked
      agent_backend: parked
      agent_invalid: parked
      timeout: parked

  - name: skel_write                 # persist skeleton + write .hbs / .cbs-head
    block: codegen.skel_write
    timeout_s: 30
    outcomes: { ok: seed_units, empty: blocked }

  - name: rehydrate                  # modification: restore the fresh worktree
    block: codegen.rehydrate         # from the DB (cached .hbs + done bodies), so
    timeout_s: 60                    # the loop re-gens only the pending units.
    outcomes: { ok: seed_units, empty: skeleton }

  - name: seed_units                 # one pending unit per function
    block: codegen.seed_units
    timeout_s: 30
    outcomes: { ok: next_fn, empty: blocked }

  # --- the per-function loop: gen one function, compile it, next (or regenerate) ---
  - name: next_fn                    # cursor: next pending function -> active,
    block: codegen.next_fn           # or 'done' once every function is green.
    max_visits: 400                  # visited ~once per function (+ loop-backs)
    timeout_s: 30
    outcomes: { next: gen_fn, done: test }

  - name: gen_fn                     # ONE function body against the frozen
    block: agent.run                 # skeleton — small context (no whole-file
    llm: genfn                       # timeout); a red localizes to this function.
    schema: function_result
    max_visits: 400
    params: { max_context_bytes: "{pack.max_context_bytes}" }
    timeout_s: 1800
    context:
      - payload
      - skeleton                     # the frozen .hbs interface to code against
      - active_contract              # this ONE function: signature + assertions
      - compile_feedback             # on a retry: the compiler's errors to fix
    outcomes:
      FUNCTION: write_fn
      EMPTY: blocked
      agent_limit: parked
      agent_backend: parked
      agent_invalid: parked
      timeout: parked

  - name: write_fn                   # store the body; rebuild .cbs from all bodies
    block: codegen.write_fn          # (a regenerate REPLACES, never appends)
    max_visits: 400
    timeout_s: 30
    outcomes: { ok: compile, empty: blocked }

  - name: compile                    # THE SOUND GATE, per function: BSC ownership
    block: verify.compile            # + null + init against the frozen interface.
    lane: build                      # green => this function is sound; red => a
    max_visits: 400                  # real defect localized to this function.
    timeout_s: 600
    params:
      cmd: "{pack.compile_cmd}"
      repo: "{paths.repo}"
    outcomes:
      green: mark_done
      red: retry_gate                # per-function-capped regenerate
      error: blocked
      timeout: parked

  - name: retry_gate                 # bump this function's attempt count; regenerate
    block: codegen.retry_gate        # ('retry') or give up ('giveup') past `cap`.
    max_visits: 400
    params: { cap: 3 }
    timeout_s: 10
    outcomes: { retry: gen_fn, giveup: blocked }

  - name: mark_done                  # this function is green -> advance the cursor
    block: codegen.mark_done
    max_visits: 400
    timeout_s: 30
    outcomes: { ok: next_fn }

  - name: test                       # business floor: run the target's tests
    block: verify.test
    timeout_s: 1800
    params: { cmd: "{pack.test_cmd}", repo: "{paths.repo}" }
    outcomes: { pass: business, fail: blocked, error: business, timeout: business }

  - name: business                   # LLM residual: value/state predicates the
    block: agent.run                 # compiler can't see, over the STRUCTURED
    llm: business                    # assertion slot (swap to Z3 later).
    schema: business_verdict
    params: { max_context_bytes: "{pack.max_context_bytes}" }
    timeout_s: 1800
    context:
      - payload
      - assertions                   # this spec's business pre/post (text+formal)
    outcomes:
      PASS: conformance
      FAIL: blocked
      agent_limit: parked
      agent_backend: parked
      agent_invalid: parked
      timeout: parked

  - name: conformance                # impl -> req: does the code fulfill each
    block: agent.run                 # atomic requirement? (the outer envelope,
    llm: conform                     # scoped per-requirement by the trace)
    schema: conformance_result
    params: { max_context_bytes: "{pack.max_context_bytes}" }
    timeout_s: 1800
    context:
      - payload
      - req_trace                    # each requirement + its fulfilling contracts/code
    outcomes:
      PASS: record_req
      FAIL: record_req               # record either way; the row carries the verdict
      agent_limit: parked
      agent_backend: parked
      agent_invalid: parked
      timeout: parked

  - name: record_req                 # write the impl->req verdicts as verifications
    block: verify.record_req         # (blocks if any requirement is violated)
    timeout_s: 30
    outcomes: { ok: announce, failed: blocked }

  - name: announce
    block: event.emit
    timeout_s: 10
    params:
      name: sdd.completed
      data: { feature_key: "{payload.feature_key}" }
    outcomes: { ok: done }

  - name: blocked                    # dead-end marker: emit a signal a human /
    block: event.emit                # a later fix loop can pick up.
    timeout_s: 10
    params:
      name: sdd.blocked
      data: { feature_key: "{payload.feature_key}", at: "{prev._step}" }
    outcomes: { ok: done }
