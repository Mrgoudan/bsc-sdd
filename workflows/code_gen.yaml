# code_gen — validated spec -> BiSheng C -> verify.
#
# The verification model, step by step:
#   compile  = the SOUND gate. A green BSC compile proves the safety column
#              (null/own/init/borrow) INSIDE every function AND across every
#              call site — i.e. the whole safety design + the joins, for free.
#   test     = the behavior floor (runs the code, sound per case).
#   behavior = the LLM residual: the value/state predicates the compiler can't
#              see, checked over the STRUCTURED assertion slot (Z3-swappable).
workflow: code_gen
consumes: [spec.validated]
emits: [sdd.completed, sdd.blocked, spec.requested]

steps:
  - name: plan_modules                       # units = modules (functions in a module
    block: codegen.plan              # share the struct/helpers -> generated
    timeout_s: 30                    # together). Single module = one loop below.
    outcomes: { ok: workspace, empty: done }

  - name: workspace
    block: worktree.create
    timeout_s: 120
    params: { repo: "{paths.repo}", base: "{payload.base}" }
    outcomes: { ok: need_skeleton, dirty: failed, timeout: failed }

  - name: need_skeleton              # first run / signature change -> build the
    block: codegen.need_skeleton     # skeleton; a plain modification -> reuse the
    timeout_s: 10                    # cached one (restore the worktree from DB).
    outcomes: { build: gen_skeleton, reuse: rehydrate }

  - name: gen_skeleton                   # the module interface, ONCE: .hbs (struct +
    block: agent.run                 # EVERY declaration) + .cbs preamble. Frozen,
    llm: skeleton                    # so per-function codegen stays consistent.
    schema: skeleton_result
    max_visits: 5                    # revisited by the check_skeleton red loop
    params: { max_context_bytes: "{pack.max_context_bytes}" }
    timeout_s: 1800
    context:
      - payload
      - spec_slice                   # all the module's contracts (signatures)
      - bsc_skill                    # the signature discipline, served — not hoped for
      - compile_feedback             # on a preflight red: the compiler's errors
    outcomes:
      SKELETON: write_skeleton
      EMPTY: blocked
      agent_limit: parked
      agent_backend: parked
      agent_invalid: parked
      timeout: parked

  - name: write_skeleton                 # persist skeleton + write .hbs / .cbs-head
    block: codegen.skel_write
    max_visits: 5
    timeout_s: 30
    outcomes: { ok: check_skeleton, empty: blocked }

  - name: rehydrate                  # modification: restore the fresh worktree
    block: codegen.rehydrate         # from the DB (cached .hbs + done bodies), so
    timeout_s: 60                    # the loop re-gens only the pending units.
    outcomes: { ok: check_skeleton, empty: gen_skeleton }

  - name: check_skeleton             # PREFLIGHT: the interface itself must
    block: verify.compile            # compile BEFORE the per-function loop —
    lane: build                      # an include/typedef/qualifier error in
    max_visits: 6                    # the skeleton is unfixable from inside
    timeout_s: 600                   # gen_function; red regenerates the
    params:                          # skeleton WITH the compiler's errors.
      cmd: "{pack.compile_cmd}"
      repo: "{paths.repo}"
    outcomes:
      green: seed_units
      red: gen_skeleton
      error: blocked
      timeout: parked

  - name: seed_units                 # one pending unit per function
    block: codegen.seed_units
    timeout_s: 30
    outcomes: { ok: need_tests, empty: blocked }

  # --- OPTIONAL TDD: tests from the SPEC, before any body exists ---
  - name: need_tests                 # payload.tdd truthy -> write the tests
    block: codegen.need_tests        # first; else straight to codegen.
    timeout_s: 10
    outcomes: { gen: gen_tests, skip: gen_module }

  - name: gen_tests                  # implementation-blind by construction:
    block: agent.run                 # only the frozen interface + the spec's
    llm: tdd                         # promises are in context — no body
    schema: tests_result             # exists anywhere yet.
    max_visits: 6
    params: { max_context_bytes: "{pack.max_context_bytes}" }
    timeout_s: 1800
    context:
      - payload
      - skeleton                     # the frozen .hbs the tests compile against
      - spec_slice                   # every contract (signatures)
      - chains                       # the spec's use cases -> the scenarios
      - assertions                   # promises needing a runtime witness
      - requirements                 # success_signal items = e2e promises
      - test_skill                   # the PROJECT's testing environment guide
      - compile_feedback             # on a retry: the compiler's errors on the TESTS
    outcomes:
      TESTS: write_tests
      EMPTY: blocked
      agent_limit: parked
      agent_backend: parked
      agent_invalid: parked
      timeout: parked

  - name: write_tests                # persist as the __tests__ pseudo-module
    block: codegen.write_tests       # (rehydrate restores it in every later
    timeout_s: 30                    # worktree, fn_edit's included)
    outcomes: { ok: compile_tests, empty: blocked }

  - name: compile_tests              # the tests hit the SOUND gate first:
    block: verify.compile            # valid BSC against the frozen interface
    lane: build                      # (syntax/ownership only — they cannot
    max_visits: 8                    # RUN yet; that is smoke_test, after the
    timeout_s: 600                   # bodies exist. Red-first, honestly.)
    params: { cmd: "{pack.compile_cmd}", repo: "{paths.repo}" }
    outcomes: { green: gen_module, red: gen_tests, error: blocked,
                timeout: parked }

  # --- WHOLE-MODULE generation: every body in ONE coherent agent call, so
  #     caller/callee wiring stays consistent (the per-function loop generated
  #     each body blind to its siblings, which produced integration bugs). A
  #     compile red or a behavior FAIL re-enters gen_module with the whole
  #     picture + the feedback; capped, then it parks. ---
  - name: gen_module                 # ALL function bodies at once
    block: agent.run
    llm: genmodule
    schema: module_result
    max_visits: 12                   # compile-red + behavior-repair loops, capped
    params: { max_context_bytes: "{pack.max_context_bytes}" }
    timeout_s: 1800
    context:
      - payload
      - skeleton                     # frozen .hbs — signatures verbatim
      - module_contracts             # EVERY contract: sig + assertions
      - bsc_skill                    # borrow/ownership discipline, served
      - module_bodies                # on a regen: last bodies (fix, re-emit rest)
      - compile_feedback             # on a compile red: whole-module errors
      - behavior_findings            # on a behavior regen: violated assertions
      - behavior_hint                # human-approved retry: the hint from the gate
      - fix_hints: { k: 3 }          # past (error -> fixed body) lessons
    outcomes:
      MODULE: write_module
      EMPTY: blocked
      agent_limit: parked
      agent_backend: parked
      agent_invalid: parked
      timeout: parked

  - name: write_module               # store every body; rebuild each .cbs
    block: codegen.write_module
    max_visits: 12
    timeout_s: 60
    outcomes: { ok: compile, empty: blocked }

  - name: compile                    # THE SOUND GATE over the WHOLE module: BSC
    block: verify.compile            # ownership/null/init/borrow, in every
    lane: build                      # function AND at every call site. red ->
    max_visits: 12                   # regenerate the module with the errors.
    timeout_s: 600
    params:
      cmd: "{pack.compile_cmd}"
      repo: "{paths.repo}"
    outcomes:
      green: smoke_test
      red: gen_module
      error: blocked
      timeout: parked

  - name: smoke_test                       # behavior floor: run the target's tests
    block: verify.test
    timeout_s: 1800
    params: { cmd: "{pack.test_cmd}", repo: "{paths.repo}" }
    outcomes: { pass: behavior_check, fail: blocked, error: behavior_check, timeout: behavior_check }

  - name: behavior_check                   # LLM residual: value/state predicates the
    block: agent.run                 # compiler can't see, over the STRUCTURED
    llm: behavior                    # assertion slot (swap to Z3 later).
    schema: behavior_verdict
    max_visits: 3                    # bounds the FAIL -> repair -> recheck loop
    params: { max_context_bytes: "{pack.max_context_bytes}" }
    timeout_s: 1800
    context:
      - payload
      - assertions                   # this spec's behavior pre/post (text+formal)
    outcomes:
      PASS: conformance_check
      FAIL: behavior_triage          # bounded scoped repair, then escalate to a human
      agent_limit: parked
      agent_backend: parked
      agent_invalid: parked
      timeout: parked

  - name: conformance_check                # impl -> req: does the code fulfill each
    block: agent.run                 # atomic requirement? (the outer envelope,
    llm: conform                     # scoped per-requirement by the trace)
    schema: conformance_result
    params: { max_context_bytes: "{pack.max_context_bytes}" }
    timeout_s: 1800
    context:
      - payload
      - req_trace                    # each requirement + its fulfilling contracts/code
    outcomes:
      PASS: record_verdicts
      FAIL: record_verdicts               # record either way; the row carries the verdict
      agent_limit: parked
      agent_backend: parked
      agent_invalid: parked
      timeout: parked

  - name: record_verdicts                 # write the impl->req verdicts as verifications
    block: verify.record_req         # (blocks if any requirement is violated)
    timeout_s: 30
    outcomes: { ok: write_docs, failed: blocked }

  - name: write_docs                 # refresh spec.md/design.md with the
    block: docs.render               # verification trail of this build.
    timeout_s: 30
    params: { out_dir: "{paths.data_root}/docs" }
    outcomes: { ok: announce, empty: blocked }

  - name: announce
    block: event.emit
    timeout_s: 10
    params:
      name: sdd.completed
      data: { feature_key: "{payload.feature_key}" }
    outcomes: { ok: done }

  - name: behavior_triage            # bounded body-repair, then ESCALATE: a
    block: codegen.behavior_triage   # contract under the cap gets one more scoped
    max_visits: 6                    # regen (current_body + behavior_findings); a
    timeout_s: 30                    # contract STILL violating past the cap stops
    params: { cap: 1 }               # guessing and goes to a human.
    outcomes: { repend: gen_module, escalate: behavior_gate, none: blocked }

  - name: behavior_gate              # THE HUMAN GATE for stuck behavior: replan the
    block: human.ask                 # design, hint the body, or abandon. Persistent
    max_visits: 6                    # behavior failure is not silently re-guessed.
    timeout_s: 30
    params: { key: "{payload.feature_key}/behavior" }
    outcomes:
      picked: behavior_escalate      # "Replan the design" -> back to plan
      revise: behavior_reset         # "Retry the body with a hint" (comment)
      reframe: behavior_reset
      abandon: blocked
      awaiting_human: parked

  - name: behavior_reset             # human gave a hint: re-pend stuck units,
    block: codegen.behavior_reset    # clear counters (fresh cap), loop with the
    max_visits: 6                    # hint served via behavior_hint.
    timeout_s: 30
    outcomes: { ok: gen_module, none: blocked }

  - name: behavior_escalate          # human chose replan: hand persistent
    block: codegen.behavior_escalate # violations back to plan (spec.requested +
    timeout_s: 30                    # behavior_design_feedback); the delta re-runs.
    outcomes: { ok: done, missing: blocked }

  - name: blocked                    # dead-end marker: emit a signal a human /
    block: event.emit                # a later fix loop can pick up.
    timeout_s: 10
    params:
      name: sdd.blocked
      data: { feature_key: "{payload.feature_key}" }
    outcomes: { ok: done }
