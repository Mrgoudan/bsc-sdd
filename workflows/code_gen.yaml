# code_gen — validated spec -> BiSheng C -> verify.
#
# The verification model, step by step:
#   compile  = the SOUND gate. A green BSC compile proves the safety column
#              (null/own/init/borrow) INSIDE every function AND across every
#              call site — i.e. the whole safety design + the joins, for free.
#   test     = the behavior floor (runs the code, sound per case).
#   behavior = the LLM residual: the value/state predicates the compiler can't
#              see, checked over the STRUCTURED assertion slot (Z3-swappable).
workflow: code_gen
consumes: [spec.validated]
emits: [sdd.completed, sdd.blocked]

steps:
  - name: plan_modules                       # units = modules (functions in a module
    block: codegen.plan              # share the struct/helpers -> generated
    timeout_s: 30                    # together). Single module = one loop below.
    outcomes: { ok: workspace, empty: done }

  - name: workspace
    block: worktree.create
    timeout_s: 120
    params: { repo: "{paths.repo}", base: "{payload.base}" }
    outcomes: { ok: need_skeleton, dirty: failed, timeout: failed }

  - name: need_skeleton              # first run / signature change -> build the
    block: codegen.need_skeleton     # skeleton; a plain modification -> reuse the
    timeout_s: 10                    # cached one (restore the worktree from DB).
    outcomes: { build: gen_skeleton, reuse: rehydrate }

  - name: gen_skeleton                   # the module interface, ONCE: .hbs (struct +
    block: agent.run                 # EVERY declaration) + .cbs preamble. Frozen,
    llm: skeleton                    # so per-function codegen stays consistent.
    schema: skeleton_result
    params: { max_context_bytes: "{pack.max_context_bytes}" }
    timeout_s: 1800
    context:
      - payload
      - spec_slice                   # all the module's contracts (signatures)
    outcomes:
      SKELETON: write_skeleton
      EMPTY: blocked
      agent_limit: parked
      agent_backend: parked
      agent_invalid: parked
      timeout: parked

  - name: write_skeleton                 # persist skeleton + write .hbs / .cbs-head
    block: codegen.skel_write
    timeout_s: 30
    outcomes: { ok: seed_units, empty: blocked }

  - name: rehydrate                  # modification: restore the fresh worktree
    block: codegen.rehydrate         # from the DB (cached .hbs + done bodies), so
    timeout_s: 60                    # the loop re-gens only the pending units.
    outcomes: { ok: seed_units, empty: gen_skeleton }

  - name: seed_units                 # one pending unit per function
    block: codegen.seed_units
    timeout_s: 30
    outcomes: { ok: need_tests, empty: blocked }

  # --- OPTIONAL TDD: tests from the SPEC, before any body exists ---
  - name: need_tests                 # payload.tdd truthy -> write the tests
    block: codegen.need_tests        # first; else straight to codegen.
    timeout_s: 10
    outcomes: { gen: gen_tests, skip: next_function }

  - name: gen_tests                  # implementation-blind by construction:
    block: agent.run                 # only the frozen interface + the spec's
    llm: tdd                         # promises are in context — no body
    schema: tests_result             # exists anywhere yet.
    max_visits: 6
    params: { max_context_bytes: "{pack.max_context_bytes}" }
    timeout_s: 1800
    context:
      - payload
      - skeleton                     # the frozen .hbs the tests compile against
      - spec_slice                   # every contract (signatures)
      - assertions                   # the promises each case must pin
      - requirements                 # success_signal items = e2e scenarios
      - compile_feedback             # on a retry: the compiler's errors on the TESTS
    outcomes:
      TESTS: write_tests
      EMPTY: blocked
      agent_limit: parked
      agent_backend: parked
      agent_invalid: parked
      timeout: parked

  - name: write_tests                # persist as the __tests__ pseudo-module
    block: codegen.write_tests       # (rehydrate restores it in every later
    timeout_s: 30                    # worktree, fn_edit's included)
    outcomes: { ok: compile_tests, empty: blocked }

  - name: compile_tests              # the tests hit the SOUND gate first:
    block: verify.compile            # valid BSC against the frozen interface
    lane: build                      # (syntax/ownership only — they cannot
    max_visits: 8                    # RUN yet; that is smoke_test, after the
    timeout_s: 600                   # bodies exist. Red-first, honestly.)
    params: { cmd: "{pack.compile_cmd}", repo: "{paths.repo}" }
    outcomes: { green: next_function, red: gen_tests, error: blocked,
                timeout: parked }

  # --- the per-function loop: gen one function, compile it, next (or regenerate) ---
  - name: next_function                    # cursor: next pending function -> active,
    block: codegen.next_fn           # or 'done' once every function is green.
    max_visits: 400                  # visited ~once per function (+ loop-backs)
    timeout_s: 30
    outcomes: { next: gen_function, done: smoke_test }

  - name: gen_function                     # ONE function body against the frozen
    block: agent.run                 # skeleton — small context (no whole-file
    llm: genfn                       # timeout); a red localizes to this function.
    schema: function_result
    max_visits: 400
    params: { max_context_bytes: "{pack.max_context_bytes}" }
    timeout_s: 1800
    context:
      - payload
      - skeleton                     # the frozen .hbs interface to code against
      - active_contract              # this ONE function: signature + assertions
      - compile_feedback             # on a retry: the compiler's errors to fix
      - similar: { k: 2 }            # idioms for THIS function (IDF-ranked)
      - fix_hints: { k: 2 }          # on a retry: past (same error -> fixed body) lessons
      - select:                      # the most similar already-GREEN function, via
          corpus: green_bodies       # the ENGINE cascade (embeddings cached; flip
          query: "{prev.summary} {prev.signature}"   # to a pinned model in config)
          filter: { feature_key: "{payload.feature_key}" }
          k: 1
    outcomes:
      FUNCTION: write_function
      EMPTY: blocked
      agent_limit: parked
      agent_backend: parked
      agent_invalid: parked
      timeout: parked

  - name: write_function                   # store the body; rebuild .cbs from all bodies
    block: codegen.write_fn          # (a regenerate REPLACES, never appends)
    max_visits: 400
    timeout_s: 30
    outcomes: { ok: compile, empty: blocked }

  - name: compile                    # THE SOUND GATE, per function: BSC ownership
    block: verify.compile            # + null + init against the frozen interface.
    lane: build                      # green => this function is sound; red => a
    max_visits: 400                  # real defect localized to this function.
    timeout_s: 600
    params:
      cmd: "{pack.compile_cmd}"
      repo: "{paths.repo}"
    outcomes:
      green: mark_done
      red: retry_gate                # per-function-capped regenerate
      error: blocked
      timeout: parked

  - name: retry_gate                 # bump this function's attempt count; regenerate
    block: codegen.retry_gate        # ('retry') or give up ('giveup') past `cap`.
    max_visits: 400
    params: { cap: 3 }
    timeout_s: 10
    outcomes: { retry: gen_function, giveup: blocked }

  - name: mark_done                  # this function is green -> advance the cursor
    block: codegen.mark_done
    max_visits: 400
    timeout_s: 30
    outcomes: { ok: next_function }

  - name: smoke_test                       # behavior floor: run the target's tests
    block: verify.test
    timeout_s: 1800
    params: { cmd: "{pack.test_cmd}", repo: "{paths.repo}" }
    outcomes: { pass: behavior_check, fail: blocked, error: behavior_check, timeout: behavior_check }

  - name: behavior_check                   # LLM residual: value/state predicates the
    block: agent.run                 # compiler can't see, over the STRUCTURED
    llm: behavior                    # assertion slot (swap to Z3 later).
    schema: behavior_verdict
    params: { max_context_bytes: "{pack.max_context_bytes}" }
    timeout_s: 1800
    context:
      - payload
      - assertions                   # this spec's behavior pre/post (text+formal)
    outcomes:
      PASS: conformance_check
      FAIL: blocked
      agent_limit: parked
      agent_backend: parked
      agent_invalid: parked
      timeout: parked

  - name: conformance_check                # impl -> req: does the code fulfill each
    block: agent.run                 # atomic requirement? (the outer envelope,
    llm: conform                     # scoped per-requirement by the trace)
    schema: conformance_result
    params: { max_context_bytes: "{pack.max_context_bytes}" }
    timeout_s: 1800
    context:
      - payload
      - req_trace                    # each requirement + its fulfilling contracts/code
    outcomes:
      PASS: record_verdicts
      FAIL: record_verdicts               # record either way; the row carries the verdict
      agent_limit: parked
      agent_backend: parked
      agent_invalid: parked
      timeout: parked

  - name: record_verdicts                 # write the impl->req verdicts as verifications
    block: verify.record_req         # (blocks if any requirement is violated)
    timeout_s: 30
    outcomes: { ok: write_docs, failed: blocked }

  - name: write_docs                 # refresh spec.md/design.md with the
    block: docs.render               # verification trail of this build.
    timeout_s: 30
    params: { out_dir: "{paths.data_root}/docs" }
    outcomes: { ok: announce, empty: blocked }

  - name: announce
    block: event.emit
    timeout_s: 10
    params:
      name: sdd.completed
      data: { feature_key: "{payload.feature_key}" }
    outcomes: { ok: done }

  - name: blocked                    # dead-end marker: emit a signal a human /
    block: event.emit                # a later fix loop can pick up.
    timeout_s: 10
    params:
      name: sdd.blocked
      data: { feature_key: "{payload.feature_key}" }
    outcomes: { ok: done }
