# plan — requirement -> spec IR -> validate_spec (the FIRST step of a normal run).
#
# Produces the IR (contracts + structured assertions + chains) from a plain
# requirement, then runs the DETERMINISTIC structural checks (ids unique, refs
# resolve, chain steps resolve to contracts, impl_files present). No proving
# here — this only guarantees the spec is well-formed, exactly like SpecLang's
# mechanical validator. Semantic/behavior checking happens in code_gen against
# the actual code, where the compiler + tests can be sound.
workflow: plan
consumes: [spec.requested]
emits: [spec.validated, spec.rejected, spec.questions]

steps:
  - name: decompose                  # prose requirement -> atomic, ID'd items,
    block: agent.run                 # BEFORE the spec, so coverage is independent
    llm: decompose
    schema: requirements_result
    resumable: true                  # a RETRY reuses the recorded result — same
                                     # inputs resume cheap; changed inputs use
                                     # the revise path and re-derive
    max_visits: 2                    # one retry, driven by the fidelity gate
    params:
      max_context_bytes: "{pack.max_context_bytes}"
      cwd: "{paths.repo}"            # agentic search: explore the target repo
    timeout_s: 1800
    context:
      - payload                      # the raw requirement text + feature key
      - requirements                 # previous R-* list (keep ids stable on a re-run)
      - requirement_delta            # EXACT doc diff since last run (never drop new clauses)
      - dialogue                     # the Q&A so far (multi-turn memory)
      - decompose_feedback           # on a retry: the fidelity gate's findings
    outcomes:
      REQS: req_questions
      QUESTIONS: req_questions
      EMPTY: rejected
      agent_limit: parked
      agent_backend: parked
      agent_invalid: parked
      timeout: parked

  - name: req_questions                      # Q&A router: record assumptions, or park
    block: spec.ask                  # on blocking questions until answered
    params: { stage: decompose }     # (scripts/answer.py or the board unparks)
    max_visits: 2
    timeout_s: 30
    outcomes: { proceed: persist_reqs, waiting: parked }

  - name: persist_reqs               # stable-key reconcile of the R-* items
    block: reqs.load
    max_visits: 2
    timeout_s: 30
    outcomes: { ok: fidelity_check, empty: rejected }

  - name: fidelity_check                 # FIDELITY GATE: do the R-* items faithfully
    block: agent.run                 # capture the RAW request? (missing/invented/
    llm: reqcheck                    # distorted). The one gate that cannot be
    schema: reqs_verdict             # sound — so it is disprove-first + retried.
    resumable: true
    max_visits: 2
    params: { max_context_bytes: "{pack.max_context_bytes}" }
    timeout_s: 1800
    context:
      - payload                      # the raw requirement (the ground truth)
      - requirements                 # the persisted R-* list under judgment
      - requirement_delta            # doc diff: every ADDED line must have a home
    outcomes:
      PASS: design_brief
      FAIL: decompose                # re-decompose with the findings; visit caps
      agent_limit: parked            # bound the loop (2nd FAIL -> budget exhausted)
      agent_backend: parked
      agent_invalid: parked
      timeout: parked

  - name: design_brief               # a REAL fork? offer 2-4 options with
    block: agent.run                 # pros/cons/risks/sketches; SKIP when the
    llm: brief                       # design is established or obvious — a
    schema: brief_result             # routine change must not stall on ceremony.
    resumable: true
    max_visits: 4
    params:
      max_context_bytes: "{pack.max_context_bytes}"
      cwd: "{paths.repo}"
    timeout_s: 1800
    context:
      - payload
      - requirements
      - design_rounds                # the thread so far: rejections are DEAD
      - current_spec                 # established design => SKIP
      - prior_art
    outcomes:
      OPTIONS: design_gate
      SKIP: write_spec
      agent_limit: parked
      agent_backend: parked
      agent_invalid: parked
      timeout: parked

  - name: design_gate                # THE HUMAN GATE: verdicts are edges.
    block: human.ask                 # picked -> write_spec (choice rides as state);
    max_visits: 8                    # revise -> next brief round (rejection
    timeout_s: 30                    # memory); reframe -> the decomposition
    params: { key: "{payload.feature_key}/design" }
    outcomes:
      picked: write_spec
      revise: design_brief
      reframe: decompose
      abandon: rejected
      awaiting_human: parked

  - name: write_spec                     # requirements -> spec IR (contracts w/ BSC
    block: agent.run                 # ownership sigs, behavior assertions, and a
    llm: author                      # `fulfills` trace to the R-* items).
    schema: spec_result
    resumable: true                  # retries reuse the spec; repairs go through
    max_visits: 2                    # the DEDICATED fix_joins path, not here
    params:
      max_context_bytes: "{pack.max_context_bytes}"
      cwd: "{paths.repo}"            # agentic search while designing
    timeout_s: 1800
    context:
      - payload                      # the requirement text + feature key
      - requirements                 # the decomposed R-* items to cover + trace
      - dialogue                     # the Q&A so far (answers are requirements)
      - design_choice                # the design the human picked — HONOR IT
      - current_spec                 # existing contracts: re-emit unchanged ones VERBATIM
      - prior_art                    # reuse-first: existing APIs (other features) + design idioms
    outcomes:
      SPEC: spec_questions
      QUESTIONS: spec_questions
      EMPTY: rejected
      agent_limit: parked
      agent_backend: parked
      agent_invalid: parked
      timeout: parked

  - name: spec_questions                      # Q&A router for the design stage
    block: spec.ask
    params: { stage: author }
    max_visits: 2
    timeout_s: 30
    outcomes: { proceed: persist_spec, waiting: parked }

  - name: persist_spec                    # stage specs/contracts/assertions/chains
    block: spec.load                 # rows from the agent's IR (never commits;
    max_visits: 5                    # engine applies staged ops at the boundary).
    timeout_s: 30                    # Revisited by the repair loop.
    outcomes: { ok: validate_spec, empty: rejected }

  - name: validate_spec                   # deterministic structural checks + coverage
    block: spec.validate             # gate over the IR. NOT a proof.
    max_visits: 5
    timeout_s: 30
    outcomes: { ok: design_check, invalid: rejected }

  - name: design_check               # MECHANICAL join gate: every new-and-direct
    block: design.check              # call's qualifier handoff must be compatible.
    max_visits: 5                    # Deterministic. A failure is a HANDLED
    timeout_s: 30                    # path: the dedicated repair step reworks
    outcomes: { ok: write_docs, broken: fix_joins }  # ONLY the affected joins.

  # --- the dedicated repair path: scoped rework, never a full re-author ---
  - name: write_docs                 # spec.md (WHAT) + design.md (HOW) —
    block: docs.render               # projections of the DB, regenerated at
    timeout_s: 30                    # every milestone; never hand-edited.
    params: { out_dir: "{paths.data_root}/docs" }
    outcomes: { ok: announce, empty: rejected }

  - name: announce                   # hand-off carries the KEYS, not the IR:
    block: event.emit                # code_gen reads the spec from the DB by
    timeout_s: 10                    # feature_key; base rides through for the
    params:                          # worktree. (spec.requested must carry base.)
      name: spec.validated
      force: true                    # a re-validated spec must RE-trigger the build
      data: { feature_key: "{payload.feature_key}", base: "{payload.base}",
              tdd: "{payload.tdd}" }
    outcomes: { ok: done }

  - name: fix_joins                  # fix EXACTLY the broken handoffs: sees the
    block: agent.run                 # breaks (why), the affected contracts'
    llm: joinfix                     # full IR (what), and the picked design
    schema: spec_result              # (the frame). Emits ONLY what it changed.
    max_visits: 3
    params: { max_context_bytes: "{pack.max_context_bytes}" }
    timeout_s: 1800
    context:
      - payload
      - design_breaks                # WHY it is broken (caller/callee/param/reason)
      - broken_contracts             # the affected contracts' full IR (incl. calls)
      - design_choice                # the overall design the repair must respect
    outcomes:
      SPEC: merge_fix
      QUESTIONS: repair_questions
      EMPTY: rejected
      agent_limit: parked
      agent_backend: parked
      agent_invalid: parked
      timeout: parked

  - name: repair_questions           # rare: a break needs a human call
    block: spec.ask
    params: { stage: repair }
    max_visits: 3
    timeout_s: 30
    outcomes: { proceed: merge_fix, waiting: parked }

  - name: merge_fix                  # deterministic: fold the repaired contracts
    block: spec.merge_fix            # into the last full IR — untouched contracts
    max_visits: 3                    # survive verbatim; checks see a WHOLE spec;
    timeout_s: 30                    # reconcile hash-diffs them into no-ops.
    outcomes: { ok: persist_spec, empty: rejected }

  - name: rejected                   # spec was empty or failed structural checks.
    block: event.emit                # No '{prev.*}' here: different steps route
    timeout_s: 10                    # in with different result shapes — the
    params:                          # details live in the task's audit trail.
      name: spec.rejected
      data: { feature_key: "{payload.feature_key}" }
    outcomes: { ok: done }
